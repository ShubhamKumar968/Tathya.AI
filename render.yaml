# render.yaml — Tathya.AI Render Blueprint
# Gemini-only ML pipeline (no HuggingFace required)

services:

  # ── 1. Python FastAPI — ML Service (Gemini-only) ─────────
  - type: web
    name: tathya-ml-api
    runtime: python
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # Set manually in Render dashboard

  # ── 2. Node.js Backend + Frontend ────────────────────────
  - type: web
    name: tathya-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    plan: free
    envVars:
      - key: MONGO_URI
        sync: false          # Your MongoDB Atlas URI
      - key: JWT_SECRET
        sync: false          # Any long random string
      - key: ML_API_URL
        sync: false          # URL of tathya-ml-api (e.g. https://tathya-ml-api.onrender.com)
      - key: NODE_ENV
        value: production
