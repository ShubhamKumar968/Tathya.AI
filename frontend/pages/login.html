<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — Tathya.AI</title>
  <meta name="description" content="Sign in to Tathya.AI to start detecting fake news with AI." />
  <link rel="stylesheet" href="../css/style.css" />
  <script src="../js/theme.js"></script>
</head>
<body>
  <div class="auth-wrapper">
    <div class="logo-row">
      <div class="logo-icon">🛡️</div>
      <div>
        <div class="logo-name">Tathya<span class="logo-dot">.AI</span></div>
        <div class="logo-sub">FAKE NEWS DETECTOR</div>
      </div>
      <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"></button>
    </div>

    <div class="card">
      <div class="card-title">Welcome back</div>
      <div class="card-sub">Sign in to your account</div>

      <div class="error-msg" id="errorMsg"></div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <button class="btn btn-primary" id="loginBtn" onclick="handleLogin()">Sign in</button>

      <div class="link-row">
        Don't have an account? <a href="signup.html">Sign up</a>
      </div>
      <div class="link-row" style="margin-top:8px;">
        <a href="index.html">← Back to Home</a>
      </div>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script>
    // Redirect if already logged in
    if (localStorage.getItem("token")) {
      window.location.href = "detector.html";
    }

    async function handleLogin() {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorMsg = document.getElementById("errorMsg");
      const btn      = document.getElementById("loginBtn");

      errorMsg.classList.remove("show");

      if (!email || !password) {
        errorMsg.textContent = "Please fill in all fields.";
        errorMsg.classList.add("show");
        return;
      }

      btn.textContent = "Signing in…";
      btn.disabled = true;

      const result = await loginUser(email, password);

      if (result.success) {
        window.location.href = "detector.html";
      } else {
        errorMsg.textContent = result.message || "Login failed. Try again.";
        errorMsg.classList.add("show");
        btn.textContent = "Sign in";
        btn.disabled = false;
      }
    }

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
